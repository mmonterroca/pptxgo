name: CI

permissions:
  contents: read

on:
  # push is scoped to master: a push to a feature branch that has an open
  # PR is already covered by that PR's own pull_request (synchronize)
  # event, so scoping push here avoids a duplicate run per feature-branch
  # push while still validating master after every merge.
  push:
    branches: [ master ]
  # pull_request has NO branches filter on purpose: that filter matches a
  # PR's *base* (target) branch, so scoping it to master meant a stacked
  # PR targeting another feature branch (e.g. #12 based on #11's branch)
  # never fired CI until it was retargeted to master — "no checks
  # reported" for the whole time it was mid-stack. Firing on any base lets
  # every PR in a stack get CI on its own base, from the first push.
  pull_request:

jobs:
  test-and-validate:
    name: Build, Test and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.x'
          cache: false  # No external dependencies, so no need to cache

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Unlike docxgo, where the OpenXML SDK validator existed for nine
      # months before CI ever ran it, this check is here from the first
      # commit: generate a real .pptx and validate it against the SDK on
      # every push.
      - name: Generate demo .pptx and validate against OpenXML SDK
        run: make validate
