name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-validate:
    name: Build, Test and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.x'
          cache: false  # No external dependencies, so no need to cache

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Unlike docxgo, where the OpenXML SDK validator existed for nine
      # months before CI ever ran it, this check is here from the first
      # commit: generate a real .pptx and validate it against the SDK on
      # every push.
      - name: Generate demo .pptx and validate against OpenXML SDK
        run: make validate
